<!doctype html>
<html lang="en">
  <head>
    <!-- Use correct character set. -->
    <meta charset="utf-8" />
    <!-- Tell IE to use the latest, best version. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Make the application on mobile take up the full browser screen and disable user scaling. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>天空盒</title>
    <!-- <script src="../../../Build/Cesium/Cesium.js"></script> -->
    <style>
      @import url(../../../Build/CesiumUnminified/Widgets/widgets.css);

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <script type="module">
      import * as Cesium from "../../../Build/CesiumUnminified/index.js";
      import NearGroundSkyBox from "./NearGroundSkyBox.js";
      window.CESIUM_BASE_URL = "../../../Build/CesiumUnminified/";
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDRmNjJiNS1iNmVhLTQwMDEtOWM0ZS02MTdlNWZiZmIwYjciLCJpZCI6MTEzNTYsImlhdCI6MTc0MTc4ODkyNX0.lrveOeXTCbdSofQPBpkwlC-rTJBFL9nZ1x1DI-DDKHk";

      const viewer = new Cesium.Viewer("cesiumContainer");
      window._viewer = viewer;
      viewer.camera.setView({
        destination: Cesium.Cartesian3.fromDegrees(0, 0, 7e7),
        duration: 0,
      });

      const defaultSkybox = viewer.scene.skyBox;
      // 使用 NearGroundSkyBox 替代 SkyBox，每帧根据相机 ENU 坐标系更新变换，消除倾斜
      const nearGroundSkybox = new NearGroundSkyBox(Cesium, {
        sources: {
          positiveX: "./pictures/test/px.jpg",
          negativeX: "./pictures/test/nx.jpg",
          positiveY: "./pictures/test/py.jpg",
          negativeY: "./pictures/test/ny.jpg",
          positiveZ: "./pictures/test/pz.jpg",
          negativeZ: "./pictures/test/nz.jpg",
        },
      });
      viewer.scene.postRender.addEventListener(() => {
        const height = viewer.camera.positionCartographic.height;
        if (height < 10000) {
          // 显示自定义的天空盒
          viewer.scene.skyBox = nearGroundSkybox;
          viewer.scene.skyAtmosphere.show = false;
        } else {
          viewer.scene.skyBox = defaultSkybox;
          viewer.scene.skyAtmosphere.show = true;
        }
      });
    </script>
  </body>
</html>
