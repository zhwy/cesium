<!doctype html>
<html lang="en">
  <head>
    <!-- Use correct character set. -->
    <meta charset="utf-8" />
    <!-- Tell IE to use the latest, best version. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Make the application on mobile take up the full browser screen and disable user scaling. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>MVT加载</title>
    <style>
      @import url(../../../Build/CesiumUnminified/Widgets/widgets.css);

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #toolbar {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 99;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 150px;
      }

      button {
        padding: 6px 12px;
        cursor: pointer;
      }

      button.active {
        background: #0078d4;
        color: #fff;
        border-color: #0078d4;
      }

      #pickPanel {
        position: absolute;
        top: 10px;
        left: 170px;
        z-index: 99;
        width: 320px;
        max-height: 60%;
        overflow: auto;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        padding: 12px;
        border-radius: 4px;
      }

      #diagnosticsPanel {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 99;
        width: 400px;
        max-height: 200px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        font-family: monospace;
        font-size: 11px;
        padding: 8px;
        border-radius: 4px;
      }

      #pickPanel h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      #pickPanel .backend {
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid #555;
      }

      #pickPanel .status {
        color: #ffcc00;
        margin-bottom: 8px;
      }

      #pickPanel pre {
        white-space: pre-wrap;
        word-break: break-all;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <div id="toolbar">
      <button id="btnInstances" class="active">instances（可拾取）</button>
      <button id="btnPacked">packed（不可拾取）</button>
      <button id="btnClear">清除高亮</button>
    </div>
    <div id="pickPanel">
      <h3>Pick 对比</h3>
      <div class="backend">
        当前后端：<span id="backendLabel">instances</span>
      </div>
      <div class="status" id="pickStatus">点击地图要素查看拾取结果。</div>
      <pre id="pickResult">{}</pre>
    </div>
    <div id="diagnosticsPanel">
      <h3>诊断信息</h3>
      <pre id="diagnosticsResult">等待数据...</pre>
    </div>
    <script type="module">
      import * as Cesium from "../../../Build/CesiumUnminified/index.js";
      import VectorTileLayerManager from "./src/VectorTileLayerManager.js";
      import createVectorTileBenchmark from "./src/VectorTileBenchmark.js";

      window.CESIUM_BASE_URL = "../../../Build/CesiumUnminified/";
      window.Cesium = Cesium;
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDRmNjJiNS1iNmVhLTQwMDEtOWM0ZS02MTdlNWZiZmIwYjciLCJpZCI6MTEzNTYsImlhdCI6MTc0MTc4ODkyNX0.lrveOeXTCbdSofQPBpkwlC-rTJBFL9nZ1x1DI-DDKHk";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        timeline: false,
        fullscreenButton: false,
        vrButton: false,
        animation: false,
      });
      viewer.scene.debugShowFramesPerSecond = true;
      window._viewer = viewer;
      viewer.imageryLayers.addImageryProvider(
        new Cesium.TileCoordinatesImageryProvider({
          tileWidth: 512,
          tileHeight: 512,
        }),
      );

      // Cesium.MVTDataProvider.fromUrl(
      //   "https://mapservice.bdhic.com/geoservice-rvt-api/maps/res_org_gr/{z}/{x}/{y}.pbf",
      // ).then((tileset) => {
      //   // viewer.scene.primitives.add(tileset);
      // });

      const manager = new VectorTileLayerManager({
        diagnostics: { enabled: true },
      });
      manager.addToScene(viewer.scene);
      window._vectorTileManager = manager;
      window.vectorTileBenchmark = createVectorTileBenchmark(viewer, manager);

      const options = [
        // {
        //   url: "http://localhost:10101/geoserver/gwc/service/tms/1.0.0/ne%3Aworld@EPSG%3A900913@pbf/{z}/{x}/{-y}.pbf",
        //   styles: {
        //     countries: {
        //       fill: true,
        //       fillColor: "#ff00ff77",
        //       fillOutline: true,
        //       fillOutlineColor: "#ff00ff",
        //       fillOutlineWidth: 1,
        //     },
        //     coastlines: {
        //       lineColor: "#0000ff77",
        //       lineWidth: 2,
        //     },
        //   },
        // },
        {
          url: "https://mapservice.bdhic.com/geoservice-rvt-api/maps/res_org_gr/{z}/{x}/{y}.pbf",
          minimumLevel: 0,
          maximumLevel: 10,
          styles: {
            res_org_gr: {
              fill: true,
              fillColor: "#00ff0022",
            },
          },
        },
        // {
        //   url: "https://mapservice.bdhic.com/geoservice-rvt-api/maps/res_parent_plot_boundary/{z}/{x}/{y}.pbf",
        //   minimumLevel: 11,
        //   maximumLevel: 15,
        //   styles: {
        //     res_parent_plot_boundary: {
        //       fill: true,
        //       fillColor: "#ff000077",
        //     },
        //   },
        // },
      ];

      let currentLayers = [];
      let highlightPoint;

      function createLayers(backend) {
        const allowPicking = backend === "instances";

        return options.map((option) => {
          return manager.addLayer({
            url: option.url,
            minimumLevel: option.minimumLevel,
            maximumLevel: option.maximumLevel,
            styles: option.styles,
            allowPicking: allowPicking,
            renderBackend: backend,
          });
        });
      }

      function switchBackend(backend) {
        currentLayers.forEach((layer) => {
          if (layer && !layer.isDestroyed()) {
            manager.vectorTileLayers.remove(layer, true);
          }
        });

        currentLayers = createLayers(backend);
        window._vectorTileLayers = currentLayers;
        updateBackendUI(backend);
      }

      function updateBackendUI(backend) {
        document.getElementById("backendLabel").textContent = backend;
        document
          .getElementById("btnInstances")
          .classList.toggle("active", backend === "instances");
        document
          .getElementById("btnPacked")
          .classList.toggle("active", backend === "packed");

        const statusEl = document.getElementById("pickStatus");
        if (backend === "instances") {
          statusEl.textContent =
            "instances 后端：点击地图要素可拾取到 feature id 与属性。";
          statusEl.style.color = "#90ee90";
        } else {
          statusEl.textContent =
            "packed 后端：为降低开销已禁用逐要素拾取，点击将返回 undefined。";
          statusEl.style.color = "#ffcc00";
        }
      }

      function clearHighlight() {
        if (Cesium.defined(highlightPoint)) {
          viewer.entities.remove(highlightPoint);
          highlightPoint = undefined;
        }
      }

      function showPickResult(picked) {
        const resultEl = document.getElementById("pickResult");
        if (!Cesium.defined(picked)) {
          resultEl.textContent = "（未拾取到任何要素）";
          return;
        }
        resultEl.textContent = JSON.stringify(picked?.id?.properties, null, 2);
      }

      function highlightPosition(cartesian) {
        clearHighlight();
        highlightPoint = viewer.entities.add(
          new Cesium.Entity({
            position: cartesian,
            point: {
              pixelSize: 10,
              color: Cesium.Color.BLUE,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 2,
            },
          }),
        );
      }

      const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);
      handler.setInputAction((click) => {
        const picked = viewer.scene.pick(click.position);
        showPickResult(picked);

        const ray = viewer.camera.getPickRay(click.position);
        const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
        if (Cesium.defined(cartesian)) {
          highlightPosition(cartesian);
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      document
        .getElementById("btnInstances")
        .addEventListener("click", () => switchBackend("instances"));
      document
        .getElementById("btnPacked")
        .addEventListener("click", () => switchBackend("packed"));
      document.getElementById("btnClear").addEventListener("click", () => {
        clearHighlight();
        document.getElementById("pickResult").textContent = "{}";
      });

      // 默认使用 instances 后端并开启拾取
      // switchBackend("instances");

      manager.setStyle({
        version: 1,
        sources: {
          res_org_gr: {
            type: "vector",
            url: "https://mapservice.bdhic.com/geoservice-rvt-api/maps/res_org_gr/{z}/{x}/{y}.pbf",
            minimumLevel: 5,
            maximumLevel: 15,
            allowPicking: true,
            renderBackend: "instances",
          },
          globe: {
            type: "vector",
            url: "http://localhost:10101/geoserver/gwc/service/tms/1.0.0/ne%3Aworld@EPSG%3A900913@pbf/{z}/{x}/{-y}.pbf",
            minimumLevel: 0,
            maximumLevel: 18,
            allowPicking: false,
            renderBackend: "packed",
          },
        },
        layers: [
          {
            id: "res_org_gr-level2-fill",
            type: "fill",
            source: "res_org_gr",
            sourceLayer: "res_org_gr",
            minzoom: 0,
            maxzoom: 10,
            paint: {
              "fill-color": "#00ff0022",
              "fill-outline-color": "#ff0000",
              "fill-outline-width": [
                "interpolate",
                ["linear"],
                ["zoom"],
                4,
                1,
                8,
                5,
              ],
            },
            filter: [
              "all",
              ["==", ["get", "year"], 2025],
              ["==", ["get", "org_level"], "2"],
            ],
            terrain: {
              clampToGround: true,
            },
          },
          // {
          //   id: "res_org_gr-level1-fill",
          //   type: "fill",
          //   source: "res_org_gr",
          //   sourceLayer: "res_org_gr",
          //   minzoom: 0,
          //   maxzoom: 10,
          //   paint: {
          //     "fill-color": "#ffff00",
          //   },
          //   filter: [
          //     "all",
          //     ["==", ["get", "year"], 2025],
          //     ["==", ["get", "org_level"], "1"],
          //   ],
          // },
          {
            id: "globe-text",
            type: "symbol",
            source: "globe",
            sourceLayer: "populated_places",
            paint: {
              "text-color": "#ffffff",
              "text-halo-color": "#000000",
              "text-halo-width": 3,
            },
            layout: {
              "text-field": ["get", "name"],
            },
            terrain: {
              clampToGround: true,
              // heightOffset: 10,
            },
          },
          {
            id: "globe-coastline-line",
            type: "line",
            source: "globe",
            sourceLayer: "coastlines",
            paint: {
              "line-color": "#0000ff77",
              "line-width": ["interpolate", ["linear"], ["zoom"], 1, 1, 18, 25],
            },
            terrain: {
              clampToGround: true,
            },
          },
          // {
          //   id: "countries",
          //   type: "fill",
          //   source: "globe",
          //   sourceLayer: "countries",
          //   paint: {
          //     "fill-color": "#ff00ff77",
          //     "fill-outline-color": "#ff00ff",
          //     "fill-outline-width": 2,
          //   },
          //   terrain: {
          //     heightOffset: 10,
          //   },
          // },
        ],
      });

      // 每一帧更新诊断信息
      viewer.scene.postRender.addEventListener(() => {
        const diagnostics = manager.diagnostics.snapshot();
        document.getElementById("diagnosticsResult").textContent =
          JSON.stringify(diagnostics, null, 2);
      });
    </script>
  </body>
</html>
