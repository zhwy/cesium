<!doctype html>
<html lang="en">
  <head>
    <!-- Use correct character set. -->
    <meta charset="utf-8" />
    <!-- Tell IE to use the latest, best version. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Make the application on mobile take up the full browser screen and disable user scaling. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>MVT加载</title>
    <style>
      @import url(../../../Build/CesiumUnminified/Widgets/widgets.css);

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      #toolbar {
        position: absolute;
        top: 10px;
        left: 10px;
        z-index: 99;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: 150px;
      }

      button {
        padding: 6px 12px;
        cursor: pointer;
      }

      button.active {
        background: #0078d4;
        color: #fff;
        border-color: #0078d4;
      }

      #pickPanel {
        position: absolute;
        top: 10px;
        left: 170px;
        z-index: 99;
        width: 320px;
        max-height: 60%;
        overflow: auto;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        font-family: monospace;
        font-size: 12px;
        padding: 12px;
        border-radius: 4px;
      }

      #diagnosticsPanel {
        position: absolute;
        bottom: 10px;
        left: 10px;
        z-index: 99;
        width: 400px;
        max-height: 200px;
        overflow: auto;
        background: rgba(0, 0, 0, 0.75);
        color: #fff;
        font-family: monospace;
        font-size: 11px;
        padding: 8px;
        border-radius: 4px;
      }

      #pickPanel h3 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      #pickPanel .backend {
        margin-bottom: 8px;
        padding-bottom: 8px;
        border-bottom: 1px solid #555;
      }

      #pickPanel .status {
        color: #ffcc00;
        margin-bottom: 8px;
      }

      #pickPanel pre {
        white-space: pre-wrap;
        word-break: break-all;
        margin: 0;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <div id="toolbar">
      <button id="btnInstances" class="active">instances（可拾取）</button>
      <button id="btnPacked">packed（不可拾取）</button>
      <button id="btnClear">清除选择</button>
    </div>
    <div id="pickPanel">
      <h3>Pick 对比</h3>
      <div class="backend">
        当前后端：<span id="backendLabel">instances</span>
      </div>
      <div class="status" id="pickStatus">点击地图要素查看拾取结果。</div>
      <pre id="pickResult">{}</pre>
    </div>
    <div id="diagnosticsPanel">
      <h3>诊断信息</h3>
      <pre id="diagnosticsResult">等待数据...</pre>
    </div>
    <script type="importmap">
      {
        "imports": {
          "@cesium/engine": "../../../packages/engine/index.js",
          "@tweenjs/tween.js": "https://cdn.jsdelivr.net/npm/@tweenjs/tween.js/+esm",
          "bitmap-sdf": "https://cdn.jsdelivr.net/npm/bitmap-sdf/+esm",
          "dompurify": "https://cdn.jsdelivr.net/npm/dompurify/+esm",
          "earcut": "https://cdn.jsdelivr.net/npm/earcut/+esm",
          "grapheme-splitter": "https://cdn.jsdelivr.net/npm/grapheme-splitter/+esm",
          "mersenne-twister": "https://cdn.jsdelivr.net/npm/mersenne-twister/+esm",
          "urijs": "https://cdn.jsdelivr.net/npm/urijs/+esm",
          "jsep": "https://cdn.jsdelivr.net/npm/jsep/+esm",
          "lerc": "https://cdn.jsdelivr.net/npm/lerc@2.0.0/+esm",
          "meshoptimizer": "https://cdn.jsdelivr.net/npm/meshoptimizer/+esm",
          "nosleep.js": "https://cdn.jsdelivr.net/npm/nosleep.js/+esm",
          "protobufjs/dist/minimal/protobuf.js": "https://cdn.jsdelivr.net/npm/protobufjs/dist/minimal/protobuf.js/+esm",
          "@spz-loader/core": "https://cdn.jsdelivr.net/npm/@spz-loader/core/+esm",
          "kdbush": "https://cdn.jsdelivr.net/npm/kdbush/+esm",
          "rbush": "https://cdn.jsdelivr.net/npm/rbush/+esm",
          "@zip.js/zip.js/lib/zip-core.js": "https://cdn.jsdelivr.net/npm/@zip.js/zip.js/lib/zip-core.js/+esm",
          "topojson-client": "https://cdn.jsdelivr.net/npm/topojson-client/+esm",
          "autolinker": "https://cdn.jsdelivr.net/npm/autolinker/+esm"
        }
      }
    </script>
    <script type="module">
      import * as CesiumEngine from "../../../packages/engine/index.js";
      import * as CesiumWidgets from "../../../packages/widgets/index.js";
      import VectorTileLayerManager from "./src/VectorTileLayerManager.js";
      import createVectorTileBenchmark from "./src/createVectorTileBenchmark.js";

      window.CESIUM_BASE_URL = "../../../Build/CesiumUnminified/";
      const Cesium = { ...CesiumEngine, ...CesiumWidgets };
      window.Cesium = Cesium;
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDRmNjJiNS1iNmVhLTQwMDEtOWM0ZS02MTdlNWZiZmIwYjciLCJpZCI6MTEzNTYsImlhdCI6MTc0MTc4ODkyNX0.lrveOeXTCbdSofQPBpkwlC-rTJBFL9nZ1x1DI-DDKHk";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        timeline: false,
        fullscreenButton: false,
        vrButton: false,
        animation: false,
        scene3DOnly: true,
      });
      viewer.scene.debugShowFramesPerSecond = true;
      window._viewer = viewer;
      viewer.camera.flyTo({
        destination: {
          west: 2.089170406381677,
          south: 0.7431292736133033,
          east: 2.3958119516190353,
          north: 0.8892280233096688,
        },
        // destination: Cesium.Cartesian3.fromRadians(0, 0, 1e8),
        duration: 0,
      });

      viewer.imageryLayers.addImageryProvider(
        new Cesium.TileCoordinatesImageryProvider({
          tileWidth: 512,
          tileHeight: 512,
          tilingScheme: new Cesium.WebMercatorTilingScheme(),
        }),
      );

      const manager = new VectorTileLayerManager({
        diagnostics: { enabled: true },
        pixelRatio: window.devicePixelRatio,
        tileCacheSize: 50,
        // pbfCacheBytes: 0 * 1024 * 1024,
      });
      manager.addToScene(viewer.scene);
      window._vectorTileManager = manager;
      window._vectorTileBenchmark = createVectorTileBenchmark(viewer, manager);

      let highlightPoint;
      let hoveredTarget;
      let selectedTarget;

      function switchBackend(backend) {
        const allowPicking = backend === "instances";
        hoveredTarget = undefined;
        selectedTarget = undefined;
        manager.removeAll();
        const fillStateColor = (fallback) => [
          "case",
          ["boolean", ["feature-state", "selected"], false],
          "#00ffffff",
          ["boolean", ["feature-state", "hover"], false],
          "#ffff00cc",
          fallback,
        ];
        const lineStateColor = (fallback) => [
          "case",
          ["boolean", ["feature-state", "selected"], false],
          "#00ffffff",
          ["boolean", ["feature-state", "hover"], false],
          "#ffff00ff",
          fallback,
        ];
        manager.setStyle({
          version: 1,
          sources: {
            gp_res_org_gr: {
              type: "vector",
              cacheBytes: 16 * 1024 * 1024,
              url: "http://10.7.10.105:31879/geoservice-rvt-api/maps/gp_res_org_gr/{z}/{x}/{y}.pbf",
              minimumLevel: 5,
              maximumLevel: 15,
              allowPicking: allowPicking,
              renderBackend: backend,
              promoteId: "org_code",
            },
            res_org_gr: {
              type: "vector",
              cacheBytes: 16 * 1024 * 1024,
              url: "http://10.7.10.105:31879/geoservice-rvt-api/maps/res_org_gr/{z}/{x}/{y}.pbf",
              minimumLevel: 5,
              maximumLevel: 15,
              allowPicking: allowPicking,
              renderBackend: backend,
              promoteId: "org_code",
            },
            res_parent_plot: {
              type: "vector",
              cacheBytes: 16 * 1024 * 1024,
              url: "http://10.7.10.105:31879/geoservice-rvt-api/maps/res_parent_plot/{z}/{x}/{y}.pbf",
              minimumLevel: 11,
              maximumLevel: 15,
              allowPicking: allowPicking,
              renderBackend: backend,
              promoteId: {
                res_parent_plot: "plot_name",
              },
            },
            res_parent_plot_label: {
              type: "vector",
              cacheBytes: 16 * 1024 * 1024,
              url: "http://10.7.10.105:31879/geoservice-rvt-api/maps/res_parent_plot_label/{z}/{x}/{y}.pbf",
              minimumLevel: 11,
              maximumLevel: 15,
              allowPicking: allowPicking,
              renderBackend: backend,
              promoteId: {
                res_parent_plot_label: "plot_id",
              },
            },
            globe: {
              type: "vector",
              cacheBytes: 16 * 1024 * 1024,
              url: "http://localhost:10101/geoserver/gwc/service/tms/1.0.0/ne%3Aworld@EPSG%3A900913@pbf/{z}/{x}/{-y}.pbf",
              // url: "http://localhost:10101/geoserver/ne/gwc/service/wmts?REQUEST=GetTile&SERVICE=WMTS&VERSION=1.0.0&LAYER=ne:world&STYLE=&TILEMATRIX=EPSG:3857:{z}&TILEMATRIXSET=EPSG:3857&FORMAT=application/vnd.mapbox-vector-tile&TILECOL={x}&TILEROW={y}",
              // tileType: "WMTS",
              minimumLevel: 0,
              maximumLevel: 18,
              allowPicking: allowPicking,
              renderBackend: backend,
            },
          },
          layers: [
            {
              id: "res_org_gr-level1-fill",
              type: "fill",
              source: "res_org_gr",
              sourceLayer: "res_org_gr",
              maxzoom: 5,
              paint: {
                "fill-color": fillStateColor("#ffff00"),
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "1"],
              ],
            },
            {
              id: "res_org_gr-level2-fill",
              type: "fill",
              source: "res_org_gr",
              sourceLayer: "res_org_gr",
              minzoom: 5,
              maxzoom: 10,
              paint: {
                "fill-color": fillStateColor("#00ff0022"),
                "fill-outline-color": lineStateColor("#ff0000"),
                "fill-outline-width": [
                  "interpolate",
                  ["linear"],
                  ["zoom"],
                  4,
                  1,
                  8,
                  5,
                ],
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "2"],
              ],
              terrain: {
                clampToGround: true,
              },
            },
            {
              id: "res_org_gr-level3-fill",
              type: "fill",
              source: "res_org_gr",
              sourceLayer: "res_org_gr",
              minzoom: 10,
              maxzoom: 13,
              paint: {
                "fill-color": fillStateColor("#ff000022"),
                "fill-outline-color": lineStateColor("#ff0000"),
                "fill-outline-width": 2,
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "3"],
              ],
              terrain: {
                clampToGround: true,
              },
            },
            {
              id: "res_org_gr-level4-fill",
              type: "fill",
              source: "res_org_gr",
              sourceLayer: "res_org_gr",
              minzoom: 13,
              maxzoom: 15,
              paint: {
                "fill-color": fillStateColor("#ffff0022"),
                "fill-outline-color": lineStateColor("#ff0000"),
                "fill-outline-width": 2,
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "4"],
              ],
              terrain: {
                clampToGround: true,
              },
            },
            {
              id: "gp_res_org_gr-level1-text",
              type: "symbol",
              source: "gp_res_org_gr",
              sourceLayer: "gp_res_org_gr",
              maxzoom: 5,
              layout: {
                "text-field": ["get", "org_name"],
                "text-font-family": "sans-serif",
              },
              paint: {
                "text-color": "#ffffff",
                "text-halo-color": "#000000",
                "text-halo-width": 3,
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "1"],
              ],
            },
            {
              id: "gp_res_org_gr-level2-text",
              type: "symbol",
              source: "gp_res_org_gr",
              sourceLayer: "gp_res_org_gr",
              minzoom: 5,
              maxzoom: 10,
              layout: {
                "text-field": ["get", "org_name"],
                "text-font-family": "sans-serif",
              },
              paint: {
                "text-color": "#ffffff",
                "text-halo-color": "#000000",
                "text-halo-width": 3,
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "2"],
              ],
            },
            {
              id: "gp_res_org_gr-level3-text",
              type: "symbol",
              source: "gp_res_org_gr",
              sourceLayer: "gp_res_org_gr",
              minzoom: 10,
              maxzoom: 13,
              layout: {
                "text-field": ["get", "org_name"],
                "text-font-family": "sans-serif",
              },
              paint: {
                "text-color": "#ffffff",
                "text-halo-color": "#000000",
                "text-halo-width": 3,
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "3"],
              ],
            },
            {
              id: "gp_res_org_gr-level4-text",
              type: "symbol",
              source: "gp_res_org_gr",
              sourceLayer: "gp_res_org_gr",
              minzoom: 13,
              maxzoom: 15,
              layout: {
                "text-field": ["get", "org_name"],
                "text-font-family": "sans-serif",
              },
              paint: {
                "text-color": "#ffffff",
                "text-halo-color": "#000000",
                "text-halo-width": 3,
              },
              filter: [
                "all",
                ["==", ["get", "year"], 2025],
                ["==", ["get", "org_level"], "4"],
              ],
            },
            {
              id: "res_parent_plot-fill",
              type: "fill",
              source: "res_parent_plot",
              sourceLayer: "res_parent_plot",
              minzoom: 15,
              paint: {
                "fill-color": fillStateColor("#00ffff22"),
                "fill-outline-color": lineStateColor("#00ffff"),
                "fill-outline-width": 2,
              },
              terrain: {
                clampToGround: true,
              },
              filter: ["all", ["==", ["get", "year"], 2025]],
            },
            {
              id: "res_parent_plot-label",
              type: "symbol",
              source: "res_parent_plot_label",
              sourceLayer: "res_parent_plot_label",
              minzoom: 15,
              layout: {
                "text-field": ["get", "plot_name"],
                "text-font-family": "sans-serif",
              },
              paint: {
                "text-color": "#ffffff",
                "text-halo-color": "#000000",
                "text-halo-width": 3,
              },
              filter: ["all", ["==", ["get", "year"], 2025]],
            },
            {
              id: "globe-text",
              type: "symbol",
              source: "globe",
              sourceLayer: "populated_places",
              paint: {
                "text-color": "#333333",
                "text-halo-color": "#ff0000",
                "text-halo-width": 3,
                "text-background-color": "#ffffff77",
                "text-background-padding": [6, 4],
              },
              layout: {
                "text-field": ["get", "name"],
                "text-font-family": '"Noto Sans SC", sans-serif',
                "text-anchor": "center",
                "text-offset": [0, 0],
                "icon-image": "http://localhost:8080/Apps/SampleData/fire.png",
                "text-size": [
                  "case",
                  [">", ["get", "pop_max"], 5000000],
                  18,
                  14,
                ],
                "icon-anchor": "bottom",
                "icon-width": 32,
                "icon-height": 32,
                "icon-offset": [0, -30],
                "icon-size": [
                  "case",
                  [">", ["get", "pop_max"], 5000000],
                  2.5,
                  1,
                ],
              },
              terrain: {
                clampToGround: true,
                heightOffset: 10,
              },
              minzoom: 5,
            },
            {
              id: "globe-circle",
              type: "circle",
              source: "globe",
              sourceLayer: "populated_places",
              paint: {
                "circle-radius": [
                  "interpolate",
                  ["linear"],
                  ["zoom"],
                  1,
                  2,
                  10,
                  10,
                ],
                "circle-color": "#ff6600cc",
                "circle-outline-color": "#ffffffff",
                "circle-outline-width": 2,
              },
              terrain: {
                clampToGround: true,
                heightOffset: 100,
                disableDepthTestDistance: 2e6,
              },
            },
            {
              id: "globe-coastline-line",
              type: "line",
              source: "globe",
              sourceLayer: "coastlines",
              paint: {
                "line-color": lineStateColor("#0000ff77"),
                "line-width": [
                  "interpolate",
                  ["linear"],
                  ["zoom"],
                  1,
                  1,
                  18,
                  25,
                ],
              },
              terrain: {
                clampToGround: true,
              },
            },
            {
              id: "countries",
              type: "fill",
              source: "globe",
              sourceLayer: "countries",
              paint: {
                "fill-color": fillStateColor("#ffff0077"),
              },
              maxzoom: 6,
              terrain: {
                heightOffset: 10,
              },
            },
          ],
        });

        updateBackendUI(backend);
      }

      function updateBackendUI(backend) {
        document.getElementById("backendLabel").textContent = backend;
        document
          .getElementById("btnInstances")
          .classList.toggle("active", backend === "instances");
        document
          .getElementById("btnPacked")
          .classList.toggle("active", backend === "packed");

        const statusEl = document.getElementById("pickStatus");
        if (backend === "instances") {
          statusEl.textContent =
            "instances 后端：点击地图要素可拾取到 feature id 与属性。";
          statusEl.style.color = "#90ee90";
        } else {
          statusEl.textContent =
            "packed 后端：为降低开销已禁用逐要素拾取，点击将返回 undefined。";
          statusEl.style.color = "#ffcc00";
        }
      }

      function clearHighlight() {
        if (Cesium.defined(highlightPoint)) {
          viewer.entities.remove(highlightPoint);
          highlightPoint = undefined;
        }
      }

      function showPickResult(picked) {
        const resultEl = document.getElementById("pickResult");
        const feature = manager.resolvePickedFeature(picked);
        if (!Cesium.defined(feature)) {
          resultEl.textContent = "（未拾取到任何要素）";
          return;
        }
        resultEl.textContent = JSON.stringify(feature, null, 2);
      }

      function getFeatureStateTarget(feature) {
        if (!Cesium.defined(feature) || !Cesium.defined(feature.id)) {
          return undefined;
        }
        return {
          source: feature.sourceId,
          sourceLayer: feature.sourceLayer,
          id: feature.id,
        };
      }

      function sameTarget(left, right) {
        return (
          left?.source === right?.source &&
          left?.sourceLayer === right?.sourceLayer &&
          left?.id === right?.id &&
          typeof left?.id === typeof right?.id
        );
      }

      function setHoverTarget(target) {
        if (sameTarget(hoveredTarget, target)) {
          return;
        }
        if (hoveredTarget) {
          manager.removeFeatureState(hoveredTarget, "hover");
        }
        hoveredTarget = target;
        if (hoveredTarget) {
          manager.setFeatureState(hoveredTarget, { hover: true });
        }
      }

      function setSelectedTarget(target) {
        if (sameTarget(selectedTarget, target)) {
          return;
        }
        if (selectedTarget) {
          manager.removeFeatureState(selectedTarget, "selected");
        }
        selectedTarget = target;
        if (selectedTarget) {
          manager.setFeatureState(selectedTarget, { selected: true });
        }
      }

      function highlightPosition(cartesian) {
        clearHighlight();
        highlightPoint = viewer.entities.add(
          new Cesium.Entity({
            position: cartesian,
            point: {
              pixelSize: 10,
              color: Cesium.Color.BLUE,
              outlineColor: Cesium.Color.WHITE,
              outlineWidth: 2,
            },
          }),
        );
      }

      const handler = new Cesium.ScreenSpaceEventHandler(viewer.canvas);
      handler.setInputAction((click) => {
        const picked = viewer.scene.pick(click.position);
        showPickResult(picked);
        setSelectedTarget(
          getFeatureStateTarget(manager.resolvePickedFeature(picked)),
        );

        const ray = viewer.camera.getPickRay(click.position);
        const cartesian = viewer.scene.globe.pick(ray, viewer.scene);
        if (Cesium.defined(cartesian)) {
          highlightPosition(cartesian);
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      handler.setInputAction((movement) => {
        const picked = viewer.scene.pick(movement.endPosition);
        setHoverTarget(
          getFeatureStateTarget(manager.resolvePickedFeature(picked)),
        );
      }, Cesium.ScreenSpaceEventType.MOUSE_MOVE);

      document
        .getElementById("btnInstances")
        .addEventListener("click", () => switchBackend("instances"));
      document
        .getElementById("btnPacked")
        .addEventListener("click", () => switchBackend("packed"));
      document.getElementById("btnClear").addEventListener("click", () => {
        setHoverTarget(undefined);
        setSelectedTarget(undefined);
        clearHighlight();
        document.getElementById("pickResult").textContent = "{}";
      });

      switchBackend("instances");

      // 每一帧更新诊断信息
      viewer.scene.postRender.addEventListener(() => {
        const diagnostics = manager.diagnostics.snapshot();
        document.getElementById("diagnosticsResult").textContent =
          JSON.stringify(diagnostics, null, 2);
      });
    </script>
  </body>
</html>
