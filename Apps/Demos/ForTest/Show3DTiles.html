<!doctype html>
<html lang="en">
  <head>
    <!-- Use correct character set. -->
    <meta charset="utf-8" />
    <!-- Tell IE to use the latest, best version. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Make the application on mobile take up the full browser screen and disable user scaling. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>3d tiles 压缩材质兼容测试</title>
    <script src="../Lib/tool.js"></script>
    <style>
      @import url(../../../Build/CesiumUnminified/Widgets/widgets.css);

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      button {
        position: absolute;
        z-index: 99;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer">
      <button>定位</button>
    </div>
    <script type="module">
      import * as Cesium from "../../../Build/CesiumUnminified/index.js";
      window.CESIUM_BASE_URL = "../../../Build/CesiumUnminified/";
      window.Cesium = Cesium;
      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDRmNjJiNS1iNmVhLTQwMDEtOWM0ZS02MTdlNWZiZmIwYjciLCJpZCI6MTEzNTYsImlhdCI6MTc0MTc4ODkyNX0.lrveOeXTCbdSofQPBpkwlC-rTJBFL9nZ1x1DI-DDKHk";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        shadows: true,
      });
      window._viewer = viewer;
      viewer.scene.logarithmicDepthBuffer = false;
      viewer.imageryLayers.remove(viewer.imageryLayers.get(0));

      Cesium.Cesium3DTileset.fromUrl("../TilesLocate/tiles/tileset.json", {
        // url: "https://maps.bim-ace.com:10202/全景/诸暨/地形17级分块/10-1/tileset.json",
        debugShowBoundingVolume: false,
        skipLevelOfDetail: true,
        shadows: Cesium.ShadowMode.DISABLED,
        //   preferLeaves: true,
        maximumScreenSpaceError: 16,
      }).then((tileset) => {
        viewer.scene.primitives.add(tileset);
        document.querySelector("button").addEventListener("click", () => {
          viewer.zoomTo(
            tileset,
            new Cesium.HeadingPitchRange(
              0,
              -2.0,
              Math.max(100.0 - tileset.boundingSphere.radius, 0.0),
            ),
          );
        });

        // entity与3dtiles遮挡测试

        // 绘制一个圆，查看遮挡情况
        const radius = 100;
        const orginPoint = Cesium.Matrix4.multiplyByPoint(
          tileset.modelMatrix,
          tileset.boundingSphere.center,
          new Cesium.Cartesian3(),
        ); //这是原点坐标
        const cartographic = Cesium.Cartographic.fromCartesian(orginPoint);
        cartographic.longitude += 0.00001;
        cartographic.latitude += 0.00001;
        const pos2 = Cesium.Cartographic.toCartesian(cartographic);

        const circle1 = new Cesium.CircleGeometry({
          center: orginPoint,
          radius: radius,
          height: 3,
        });
        const instance1 = new Cesium.GeometryInstance({
          geometry: circle1,
          id: "normal primitive",
        });
        const circle2 = new Cesium.CircleGeometry({
          center: orginPoint,
          radius: radius,
          height: 20,
        });
        const instance2 = new Cesium.GeometryInstance({
          geometry: circle2,
          id: "ground primitive1",
        });
        const circle3 = new Cesium.CircleGeometry({
          center: orginPoint,
          radius: radius / 2,
          height: 20,
        });
        const instance3 = new Cesium.GeometryInstance({
          geometry: circle3,
          id: "ground primitive2",
        });

        // 普通
        window._p = viewer.scene.primitives.add(
          new Cesium.Primitive({
            geometryInstances: instance1,
            appearance: new Cesium.MaterialAppearance({
              material: Cesium.Material.fromType("Color", {
                color: new Cesium.Color(1, 0, 0, 1),
              }),
            }),
          }),
        );

        // 贴地
        window._groundp = viewer.scene.groundPrimitives.add(
          new Cesium.GroundPrimitive({
            geometryInstances: instance2,
            appearance: new Cesium.MaterialAppearance({
              material: Cesium.Material.fromType("Color", {
                color: new Cesium.Color(0, 1, 0, 1),
              }),
            }),
          }),
        );
        viewer.scene.groundPrimitives.add(
          new Cesium.GroundPrimitive({
            geometryInstances: instance3,
            appearance: new Cesium.MaterialAppearance({
              material: Cesium.Material.fromType("Color", {
                color: new Cesium.Color(1, 1, 0, 1),
              }),
            }),
          }),
        );

        // entity
        window._entity = viewer.entities.add({
          position: pos2,
          id: "entity",
          ellipse: {
            semiMajorAxis: radius,
            semiMinorAxis: radius,
            material: new Cesium.Color(0, 0, 1, 1),
          },
        });

        viewer.zoomTo(
          tileset,
          new Cesium.HeadingPitchRange(
            0,
            -2.0,
            Math.max(100.0 - tileset.boundingSphere.radius, 0.0),
          ),
        );
      });
    </script>
  </body>
</html>
