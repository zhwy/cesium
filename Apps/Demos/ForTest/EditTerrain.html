<!doctype html>
<html lang="en">
  <head>
    <!-- Use correct character set. -->
    <meta charset="utf-8" />
    <!-- Tell IE to use the latest, best version. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Make the application on mobile take up the full browser screen and disable user scaling. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>地形编辑</title>
    <style>
      @import url(../../../../Build/CesiumUnminified/Widgets/widgets.css);

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      button {
        position: absolute;
        z-index: 99;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <script type="module">
      import * as Cesium from "../../../Build/CesiumUnminified/index.js";

      Cesium.Ion.defaultAccessToken =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDRmNjJiNS1iNmVhLTQwMDEtOWM0ZS02MTdlNWZiZmIwYjciLCJpZCI6MTEzNTYsImlhdCI6MTc0MTc4ODkyNX0.lrveOeXTCbdSofQPBpkwlC-rTJBFL9nZ1x1DI-DDKHk";

      const viewer = new Cesium.Viewer("cesiumContainer", {
        infoBox: false,
        terrainProvider: Cesium.createWorldTerrain(),
      });
      window._viewer = viewer;

      const pos = Cesium.Cartesian3.fromDegrees(120.04939, 29.830674, 650.67);
      const orientation = Cesium.Transforms.headingPitchRollQuaternion(
        pos,
        new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(-45), 0, 0),
      );

      const entity = viewer.entities.add({
        position: pos,
        orientation: orientation,
        model: {
          uri: "/Apps/Demos/Underground/隧道test.glb",
        },
      });
      viewer.zoomTo(entity);

      const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      let positions = [];

      handler.setInputAction(function (movement) {
        const worldPosition = viewer.scene.pickPosition(movement.position);
        if (Cesium.defined(worldPosition)) {
          positions.push(worldPosition);
          console.log(Cesium.Cartographic.fromCartesian(worldPosition));
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

      handler.setInputAction(function (movement) {
        const worldPosition = viewer.scene.pickPosition(movement.position);
        if (Cesium.defined(worldPosition)) {
          positions.push(worldPosition);
          if (positions.length > 2) {
            positions = [];
          }
        }
      }, Cesium.ScreenSpaceEventType.RIGHT_CLICK);
    </script>
  </body>
</html>
