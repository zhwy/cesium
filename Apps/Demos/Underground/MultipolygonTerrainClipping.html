<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Use correct character set. -->
    <meta charset="utf-8" />
    <!-- Tell IE to use the latest, best version. -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <!-- Make the application on mobile take up the full browser screen and disable user scaling. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no"
    />
    <title>多边形地形裁剪</title>
    <style>
      @import url(../../../../Build/Cesium/Widgets/widgets.css);

      html,
      body,
      #cesiumContainer {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }

      button {
        position: absolute;
        z-index: 99;
      }
    </style>
  </head>

  <body>
    <div id="cesiumContainer"></div>
    <script type="module">
      // import IndexedDbCache from "../Lib/indexDbCache.js";
      import * as Cesium from "../../../../Source/Cesium.js";
      window.CESIUM_BASE_URL = "../../../../Source";
      window.Cesium = Cesium;
      /* eslint-disable */
      var viewer;
      var modelHeight;
      viewer = new Cesium.Viewer("cesiumContainer", {
        terrainProvider: Cesium.createWorldTerrain(),
        imageryProvider: new Cesium.UrlTemplateImageryProvider({
          url:
            "https://mt1.google.cn/vt/lyrs=s&x={x}&y={y}&z={z}&s=Gali&scale=2",
          maximumLevel: 20,
          tileWidth: 512,
          tileHeight: 512,
        }),
      });
      window._viewer = viewer;

      var pos = Cesium.Cartesian3.fromDegrees(120.04939, 29.830674, 650.67);
      var orientation = Cesium.Transforms.headingPitchRollQuaternion(
        pos,
        new Cesium.HeadingPitchRoll(Cesium.Math.toRadians(-45), 0, 0)
      );

      var entity = viewer.entities.add({
        position: pos,
        orientation: orientation,
        model: {
          uri: "/Apps/Demos/Underground/隧道test.glb",
        },
      });
      viewer.zoomTo(entity);
      viewer.scene.screenSpaceCameraController.enableCollisionDetection = false; // 允许相机下地
      viewer.scene.backgroundColor = Cesium.Color.fromCssColorString("#7d9cd6");
      viewer.scene.debugShowFramesPerSecond = true;

      var globe = viewer.scene.globe;
      globe.depthTestAgainstTerrain = true;
      globe.undergroundColor = Cesium.Color.fromCssColorString(
        "rgb(61, 53, 51)"
      );
      globe.undergroundColorAlphaByDistance.near = 0;
      globe.undergroundColorAlphaByDistance.far = 100;
      globe.undergroundColorAlphaByDistance.nearValue = 0;
      globe.undergroundColorAlphaByDistance.farValue = 1;

      // 多边形面
      var regions = [];
      var enter0 = [
        new Cesium.Cartesian3(
          -2772742.887650405,
          4794582.798490729,
          3153744.7780146194
        ),
        new Cesium.Cartesian3(
          -2772674.656436336,
          4794608.439783057,
          3153738.8137925616
        ),
        new Cesium.Cartesian3(
          -2772722.7219077307,
          4794586.3545509735,
          3153668.8054253035
        ),
        new Cesium.Cartesian3(
          -2772755.669865955,
          4794571.594034851,
          3153687.3666535444
        ),
      ];
      var enter1 = [
        new Cesium.Cartesian3(
          -2773145.2048604973,
          4793971.340134079,
          3154313.8611840936
        ),
        new Cesium.Cartesian3(
          -2773170.3993426017,
          4793934.898254054,
          3154305.291246666
        ),
        new Cesium.Cartesian3(
          -2773165.631335552,
          4793910.460747154,
          3154320.95457774
        ),
        new Cesium.Cartesian3(
          -2773121.53409391,
          4793947.9417328285,
          3154340.6337767257
        ),
      ];
      globe.cutPolygons = [enter0, enter1];

      var handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
      handler.setInputAction(function (movement) {
        var worldPosition = viewer.scene.pickPosition(movement.position);
        if (Cesium.defined(worldPosition)) {
          regions.push(worldPosition);
          if (regions.length == 4) {
            globe.cutPolygons.push(regions);
            console.log(regions);
            regions = [];
          }
        }
      }, Cesium.ScreenSpaceEventType.LEFT_CLICK);
    </script>
  </body>
</html>
